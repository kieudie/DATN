typeorm:
  host: "${DB_HOST}"
  username: "${DB_USERNAME}"
  password: "${DB_PASSWORD}"
  synchronize: false
  port: "${DB_PORT}"
  migrationsRun: false
  name: "default"
  type: "mysql"
  database: "${DB_DATABASE}"
  keepConnectionAlive: true
  logging: true

redis:
  host: "${REDIS_HOST}"
  port: "${REDIS_PORT}"
  username: "${REDIS_USERNAME}"
  password: "${REDIS_PASSWORD}"
  db: "${REDIS_DB}"
  cache-key-name: "${REDIS_CACHE_KEY_NAME}"
  url: "${REDIS_URL}"