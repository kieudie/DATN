version: "3.8"
services:
  datn-redis:
    container_name: datn-redis
    image: redis:7.0
    command: redis-server --user datn_admin on ">datn_123456" ~* +@all
    ports:
      - 6380:6379
    volumes:
      - ./data:/data
    # command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: on-failure:3
    networks:
      - datn_recruitment_net

networks:
  datn_recruitment_net:
    external: true