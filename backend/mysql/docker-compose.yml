version: "3"
services:
  datn-mysql:
    container_name: datn-mysql
    image: "mysql:5.7.35"
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "datn_123456"
      MYSQL_DATABASE: "datn_recruitment"
    ports:
      - "3312:3306"
    volumes:
      - ./dockers/mysql:/var/lib/mysql
    networks:
      - localnet

networks:
  localnet:
    external: true
    name: datn_recruitment_net